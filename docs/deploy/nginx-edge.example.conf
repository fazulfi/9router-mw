# 9router-MW edge — example.com
# NOT default_server ([CO-TENANT-A] holds default_server)
# SSE: proxy_buffering off, long timeouts

upstream 9router_mw_backend {
 server 127.0.0.1:20128;
 keepalive 32;
}

server {
 listen 80;
 listen [::]:80;
 server_name example.com;
 return 301 https://$host$request_uri;
}

server {
 listen 443 ssl http2;
 listen [::]:443 ssl http2;
 server_name example.com;

 # Cloudflare Origin CA (Full strict). Installed 2026-07-19 on VPS.
 ssl_certificate /etc/nginx/ssl/example.com.crt;
 ssl_certificate_key /etc/nginx/ssl/example.com.key;
 ssl_session_timeout 1d;
 ssl_session_cache shared:SSL:10m;
 ssl_protocols TLSv1.2 TLSv1.3;

 # Cloudflare real IP (subset; extend as needed)
 set_real_ip_from 173.245.48.0/20;
 set_real_ip_from 103.21.244.0/22;
 set_real_ip_from 103.22.200.0/22;
 set_real_ip_from 103.31.4.0/22;
 set_real_ip_from 141.101.64.0/18;
 set_real_ip_from 108.162.192.0/18;
 set_real_ip_from 190.93.240.0/20;
 set_real_ip_from 188.114.96.0/20;
 set_real_ip_from 197.234.240.0/22;
 set_real_ip_from 198.41.128.0/17;
 set_real_ip_from 162.158.0.0/15;
 set_real_ip_from 104.16.0.0/13;
 set_real_ip_from 104.24.0.0/14;
 set_real_ip_from 172.64.0.0/13;
 set_real_ip_from 131.0.72.0/22;
 real_ip_header CF-Connecting-IP;

 client_max_body_size 128m;

 location / {
 proxy_pass http://9router_mw_backend;
 proxy_http_version 1.1;
 proxy_set_header Connection "";
 proxy_set_header Host $host;
 proxy_set_header X-Real-IP $remote_addr;
 proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
 proxy_set_header X-Forwarded-Proto $scheme;

 # SSE / long streams
 proxy_buffering off;
 proxy_cache off;
 proxy_read_timeout 3600s;
 proxy_send_timeout 3600s;
 }
}
