# 9router-MW edge — example.com
# NOT default_server ([CO-TENANT-A] holds default_server)
# SSE: proxy_buffering off, long timeouts

upstream 9router_mw_backend {
 server 127.0.0.1:20128;
 keepalive 32;
}

server {
 listen 80;
 listen [::]:80;
 server_name example.com;
 return 301 https://$host$request_uri;
}

server {
 listen 443 ssl http2;
 listen [::]:443 ssl http2;
 server_name example.com;

  # Example certificate paths; provide deployment-specific values outside this file.
  ssl_certificate /etc/nginx/ssl/example.com.crt;
  ssl_certificate_key /etc/nginx/ssl/example.com.key;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;

  # Optional trusted-proxy settings belong in deployment-specific configuration.

  client_max_body_size 128m;

  # Restrictive CSP + baseline security headers for public SPA shell and protected API.
  # Google Fonts allowed only because dashboard/index.html preconnects/loads them.
  # script/style/connect stay same-origin so Vite-built assets under /mw/ keep working.

  # API must win over the SPA fallback; never serve index.html for API errors.
  location /mw/api/ {
   proxy_pass http://9router_mw_backend;
   proxy_http_version 1.1;
   proxy_set_header Connection "";
   proxy_set_header Host $host;
   proxy_set_header X-Real-IP $remote_addr;
   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header X-Forwarded-Proto $scheme;
   proxy_buffering off;
   proxy_cache off;
   proxy_read_timeout 3600s;
   proxy_send_timeout 3600s;
   add_header Cache-Control "no-store" always;
   add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" always;
   add_header X-Content-Type-Options "nosniff" always;
   add_header Referrer-Policy "strict-origin-when-cross-origin" always;
   add_header X-Frame-Options "DENY" always;
   add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
   }

  # Read-only dashboard SPA assets.
  location = /mw/index.html {
  root /srv/example-dashboard;
  add_header Cache-Control "no-store" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "DENY" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  }

  location ~* ^/mw/.*\.(?:css|js|mjs|json|svg|png|jpg|jpeg|gif|webp|ico|woff2?)$ {
  root /srv/example-dashboard;
  expires 1y;
  add_header Cache-Control "public, immutable";
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "DENY" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  }

  location /mw/ {
  root /srv/example-dashboard;
  try_files $uri $uri/ /mw/index.html;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "DENY" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  }


  location / {
  proxy_pass http://9router_mw_backend;
 proxy_http_version 1.1;
 proxy_set_header Connection "";
 proxy_set_header Host $host;
 proxy_set_header X-Real-IP $remote_addr;
 proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
 proxy_set_header X-Forwarded-Proto $scheme;

 # SSE / long streams
 proxy_buffering off;
 proxy_cache off;
 proxy_read_timeout 3600s;
 proxy_send_timeout 3600s;
 }
}
