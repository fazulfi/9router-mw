packages:
  - "."

allowBuilds:
  better-sqlite3: true
  sharp: true
  unrs-resolver: true

# Supply-chain hardening (see react-doctor require-pnpm-hardening):
# minimumReleaseAge delays installs of freshly-published versions (minutes; 10080 = 7 days)
# so malware caught & unpublished within hours never gets installed.
# trustPolicy: no-downgrade rejects packages whose provenance/signature weakens between updates.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - next
  - "@next/*"
  - dompurify

onlyBuiltDependencies:
  - better-sqlite3
  - sharp
  - unrs-resolver

pnpm:
  requiredScripts:
    - build
trustPolicy: no-downgrade
trustPolicyExclude:
  - react-redux
  - reselect
  - semver
  - eslint-import-resolver-typescript
  - nanoid
